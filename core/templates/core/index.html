<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xabar Yuborish</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      max-width: 520px;
      width: 100%;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    }
    h1 { text-align: center; margin-bottom: 30px; color: #333; }
    form { display: flex; flex-direction: column; gap: 18px; }
    input, textarea {
      padding: 14px 16px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
    }
    input:focus, textarea:focus {
      border-color: #667eea;
      outline: none;
    }
    textarea { min-height: 140px; resize: vertical; }
    input[type="file"] {
      padding: 10px;
      border: 2px dashed #ccc;
      background: #f9f9f9;
    }
    button {
      padding: 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    button:hover { transform: translateY(-3px); }
    .messages {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      text-align: center;
    }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📨 Telegramga Xabar Yuborish</h1>
    
    {% if messages %}
      {% for message in messages %}
        <div class="messages {% if message.tags == 'success' %}success{% else %}error{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <input type="text" name="name" placeholder="Ismingiz (ixtiyoriy)">
      <textarea name="message" placeholder="Xabaringizni yozing..." required></textarea>
      <input type="file" name="file" accept="*">
      <button type="submit">Yuborish</button>
    </form>
  </div>
</body>
</html>
